<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="calculator-container">
        <div class="calculator">
            <div class="calculator-header">
                <h1><i class="fas fa-calculator"></i>Calculator</h1>
                <div class="theme-toggle" id="theme-toggle">
                    <i class="fas fa-moon"></i>
                </div>
            </div>
            
            <div class="display">
                <div class="previous-operand" id="previous-operand"></div>
                <div class="current-operand" id="current-operand">0</div>
            </div>
            
            <div class="buttons">
                <!-- First Row -->
                <button class="btn clear" data-action="clear">
                    <i class="fas fa-eraser"></i> AC
                </button>
                <button class="btn operator" data-action="delete">
                    <i class="fas fa-backspace"></i> DEL
                </button>
                <button class="btn operator" data-action="percent">
                    <i class="fas fa-percent"></i> %
                </button>
                <button class="btn operator" data-action="divide">
                    <i class="fas fa-divide"></i> ÷
                </button>
                
                <!-- Second Row -->
                <button class="btn number" data-number="7">7</button>
                <button class="btn number" data-number="8">8</button>
                <button class="btn number" data-number="9">9</button>
                <button class="btn operator" data-action="multiply">
                    <i class="fas fa-times"></i> ×
                </button>
                
                <!-- Third Row -->
                <button class="btn number" data-number="4">4</button>
                <button class="btn number" data-number="5">5</button>
                <button class="btn number" data-number="6">6</button>
                <button class="btn operator" data-action="subtract">
                    <i class="fas fa-minus"></i> -
                </button>
                
                <!-- Fourth Row -->
                <button class="btn number" data-number="1">1</button>
                <button class="btn number" data-number="2">2</button>
                <button class="btn number" data-number="3">3</button>
                <button class="btn operator" data-action="add">
                    <i class="fas fa-plus"></i> +
                </button>
                
                <!-- Fifth Row -->
                <button class="btn number zero" data-number="0">0</button>
                <button class="btn number" data-number=".">.</button>
                <button class="btn equals" data-action="equals">
                    <i class="fas fa-equals"></i> =
                </button>
            </div>
            
            <div class="calculator-footer">
                <div class="history-toggle" id="history-toggle">
                    <i class="fas fa-history"></i> History
                </div>
                <div class="scientific-toggle" id="scientific-toggle">
                    <i class="fas fa-square-root-alt"></i> Scientific
                </div>
            </div>
        </div>
        
        <div class="history-panel" id="history-panel">
            <div class="history-header">
                <h3><i class="fas fa-history"></i> Calculation History</h3>
                <button class="clear-history" id="clear-history">
                    <i class="fas fa-trash"></i> Clear
                </button>
            </div>
            <div class="history-list" id="history-list">
                <!-- History items will be added here -->
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
